// Find which Level-2 group owns a given route; falls back to the first group.
function navGroupForRoute(compassId, route) {
  const cfg = NAV[compassId];
  if (!cfg) return null;
  const hit = cfg.groups.find(g => g.modules.some(m => m.id === route));
  return hit || cfg.groups[0];
}

<script type="text/babel">
/* global React, window */
// Shared UI primitives for DSB. Loaded before screen modules.

const { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext, Fragment } = React;

// --- Icon ---
function Icon({ name, className = "", filled = false, weight = 400, size = 20, style }) {
  const fvs = `'FILL' ${filled ? 1 : 0}, 'wght' ${weight}, 'GRAD' 0, 'opsz' 24`;
  return (
    <span
      className={`material-symbols-outlined select-none ${className}`}
      style={{ fontVariationSettings: fvs, fontSize: size, lineHeight: 1, ...(style || {}) }}
    >{name}</span>
  );
}

// --- Avatar ---
function Avatar({ initials, name, size = 36, tone = "blue", className = "", subtle = false }) {
  const palette = {
    blue:   ["#3D3530", "#E3DFD5"],
    green:  ["#16A34A", "#DCFCE7"],
    amber:  ["#D97706", "#FEF3C7"],
    purple: ["#6D3A8A", "#EDE0F5"],
    slate:  ["#6B6560", "#EAE5DA"],
    rose:   ["#C2185B", "#FCE4EC"]
  };
  const [fg, bg] = palette[tone] || palette.blue;
  const label = initials || (name ? name.split(" ").slice(-2).map(s => s[0]).join("").toUpperCase() : "??");
  return (
    <div
      className={`inline-flex items-center justify-center rounded-full font-display font-semibold tracking-tight ${className}`}
      style={{
        width: size, height: size, fontSize: Math.max(11, Math.round(size * 0.36)),
        backgroundColor: subtle ? bg : bg,
        color: subtle ? fg : fg,
        boxShadow: subtle ? "none" : `inset 0 0 0 1px rgba(60,45,30,0.08)`
      }}
      title={name}
    >{label}</div>
  );
}

// --- Badge / Chip ---
function Badge({ children, tone = "neutral", size = "sm", icon, className = "" }) {
  const tones = {
    neutral:  "bg-[#EAE5DA] text-[#6B6560]",
    blue:     "bg-[#F0EDE8] text-[#3D3530]",
    green:    "bg-emerald-50 text-emerald-700",
    amber:    "bg-amber-50 text-amber-700",
    red:      "bg-red-50 text-red-700",
    purple:   "bg-fuchsia-50 text-fuchsia-700",
    dark:     "bg-[#1A1A1A] text-white",
    outline:  "border border-[#E3DFD5] text-[#6B6560]",
    ghost:    "bg-white/60 backdrop-blur text-[#6B6560] border border-[#E3DFD5]/60"
  };
  const sizes = {
    xs: "text-[10px] px-1.5 py-0.5 gap-1",
    sm: "text-[11px] px-2 py-0.5 gap-1",
    md: "text-xs px-2.5 py-1 gap-1.5"
  };
  return (
    <span className={`inline-flex items-center rounded-full font-semibold tracking-wide ${tones[tone]} ${sizes[size]} ${className}`}>
      {icon && <Icon name={icon} size={size === "md" ? 14 : 12} />}
      {children}
    </span>
  );
}

// --- Priority pill (P1/P2/P3/P4) ---
function PriorityPill({ level = "P2", className = "" }) {
  const map = {
    P1: { bg: "bg-red-500/10",     fg: "text-red-600",      ring: "ring-red-500/30",     dot: "bg-red-500" },
    P2: { bg: "bg-amber-500/10",   fg: "text-amber-700",    ring: "ring-amber-500/30",   dot: "bg-amber-500" },
    P3: { bg: "bg-[#F0EDE8]",      fg: "text-[#3D3530]",    ring: "ring-[#E3DFD5]",      dot: "bg-[#3D3530]" },
    P4: { bg: "bg-[#EAE5DA]",      fg: "text-[#6B6560]",    ring: "ring-[#E3DFD5]",      dot: "bg-[#9B948D]" }
  }[level] || {};
  return (
    <span className={`inline-flex items-center gap-1.5 rounded-md px-1.5 py-0.5 text-[11px] font-bold ring-1 ${map.bg} ${map.fg} ${map.ring} ${className}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${map.dot}`}></span>{level}
    </span>
  );
}

// --- Button ---
function Button({ children, tone = "primary", size = "md", icon, iconRight, className = "", as: As = "button", ...props }) {
  const sizes = {
    xs: "h-7 px-2.5 text-[12px] gap-1.5 rounded-md",
    sm: "h-8 px-3 text-[13px] gap-1.5 rounded-lg",
    md: "h-9 px-4 text-sm gap-2 rounded-lg",
    lg: "h-11 px-5 text-[15px] gap-2 rounded-lg",
    icon: "w-9 h-9 rounded-lg justify-center"
  };
  const tones = {
    primary:   "bg-[#1A1A1A] text-white hover:bg-[#2A2420] active:scale-[.98] shadow-xs",
    dark:      "bg-[#0D0D0D] text-white hover:bg-[#1A1A1A] active:scale-[.98]",
    soft:      "bg-[#EAE5DA] text-[#3D3530] hover:bg-[#E3DFD5]",
    neutral:   "bg-[#F0EDE8] text-[#1A1A1A] hover:bg-[#EAE5DA]",
    outline:   "bg-white text-[#1A1A1A] ring-1 ring-[#E3DFD5] hover:bg-[#F5F3EF]",
    ghost:     "text-[#6B6560] hover:bg-[#F0EDE8]",
    danger:    "bg-red-50 text-red-700 hover:bg-red-100",
    success:   "bg-emerald-500 text-white hover:bg-emerald-600",
    link:      "text-[#3D3530] hover:underline px-0 h-auto"
  };
  return (
    <As
      className={`inline-flex items-center font-display font-medium whitespace-nowrap transition-all ${sizes[size]} ${tones[tone]} ${className}`}
      {...props}
    >
      {icon && <Icon name={icon} size={size === "lg" ? 18 : 16} weight={500} />}
      {children}
      {iconRight && <Icon name={iconRight} size={size === "lg" ? 18 : 16} weight={500} />}
    </As>
  );
}

// --- Card ---
function Card({ children, className = "", padded = true, hoverable = false }) {
  const hasBg  = className.includes("bg-");
  const isDark = className.includes("bg-[#1A1A1A]") || className.includes("bg-[#2A");
  return (
    <section className={`
      ${hasBg ? "" : "bg-white"}
      rounded-lg shadow-soft
      ${isDark ? "ring-1 ring-white/10" : "ring-1 ring-[#E3DFD5]/60"}
      ${padded ? "p-6" : ""}
      ${hoverable ? "transition-shadow hover:shadow-lift" : ""}
      ${className}
    `}>
      {children}
    </section>
  );
}

function SectionTitle({ children, sub, action, className = "" }) {
  return (
    <div className={`flex items-end justify-between gap-4 mb-4 ${className}`}>
      <div>
        <h3 className="font-display text-title-lg text-[#1A1A1A]">{children}</h3>
        {sub && <p className="text-body-sm text-[#6B6560] mt-0.5">{sub}</p>}
      </div>
      {action}
    </div>
  );
}

// --- Tabs ---
function Tabs({ value, onChange, tabs, dense = false, className = "" }) {
  return (
    <div className={`flex items-center gap-1 ${dense ? "" : "border-b border-[#E3DFD5]"} ${className}`}>
      {tabs.map(t => {
        const active = t.id === value;
        return (
          <button
            key={t.id}
            onClick={() => onChange(t.id)}
            className={`relative inline-flex items-center gap-2 font-display font-medium transition-all
              ${dense ? "px-3 py-1.5 rounded-md text-[13px]" : "px-4 py-3 text-sm"}
              ${active
                ? (dense ? "bg-[#1A1A1A] text-white" : "text-[#1A1A1A]")
                : (dense ? "text-[#6B6560] hover:bg-[#F0EDE8]" : "text-[#6B6560] hover:text-[#1A1A1A]")}`}
          >
            {t.icon && <Icon name={t.icon} size={16} />}
            <span>{t.label}</span>
            {typeof t.count === "number" && (
              <span className={`text-[10px] font-bold rounded-full px-1.5 py-0.5 ${active && !dense ? "bg-[#1A1A1A] text-white" : "bg-[#EAE5DA] text-[#6B6560]"}`}>{t.count}</span>
            )}
            {!dense && active && <span className="absolute left-2 right-2 -bottom-px h-0.5 rounded-full bg-[#1A1A1A]"></span>}
          </button>
        );
      })}
    </div>
  );
}

// --- Toggle / Switch ---
function Toggle({ on, onChange, label, hint }) {
  return (
    <label className="inline-flex items-center gap-3 cursor-pointer select-none">
      <span className={`relative w-9 h-5 rounded-full transition-colors ${on ? "bg-[#1A1A1A]" : "bg-[#E3DFD5]"}`}>
        <span className={`absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform ${on ? "translate-x-4" : ""}`}></span>
      </span>
      {(label || hint) && (
        <span>
          {label && <span className="block text-sm font-medium text-[#1A1A1A]">{label}</span>}
          {hint && <span className="block text-[12px] text-[#6B6560]">{hint}</span>}
        </span>
      )}
      <input type="checkbox" className="sr-only" checked={!!on} onChange={(e) => onChange?.(e.target.checked)} />
    </label>
  );
}

// --- Modal ---
function Modal({ open, onClose, title, sub, children, footer, size = "md" }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose?.(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [open, onClose]);
  if (!open) return null;
  const widths = { sm: "max-w-md", md: "max-w-2xl", lg: "max-w-4xl", xl: "max-w-6xl" };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-6 animate-fade-in">
      <div className="absolute inset-0 bg-[#1A1A1A]/40 backdrop-blur-sm" onClick={onClose}></div>
      <div className={`relative z-10 w-full ${widths[size]} bg-white rounded-lg shadow-lift overflow-hidden`}>
        <div className="flex items-start justify-between gap-6 px-6 py-5 border-b border-[#E3DFD5]">
          <div>
            <h2 className="font-display text-title-lg text-[#1A1A1A]">{title}</h2>
            {sub && <p className="text-body-sm text-[#6B6560] mt-1">{sub}</p>}
          </div>
          <button className="w-9 h-9 rounded-full hover:bg-[#F0EDE8] flex items-center justify-center text-[#6B6560]" onClick={onClose}>
            <Icon name="close" size={20} />
          </button>
        </div>
        <div className="px-6 py-5 max-h-[70vh] overflow-y-auto scrollbar-thin">{children}</div>
        {footer && <div className="px-6 py-4 border-t border-[#E3DFD5] flex items-center justify-end gap-2 bg-[#F5F3EF]">{footer}</div>}
      </div>
    </div>
  );
}

// --- Drawer (right side) ---
function Drawer({ open, onClose, children, width = 720 }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 animate-fade-in">
      <div className="absolute inset-0 bg-[#1A1A1A]/30 backdrop-blur-sm" onClick={onClose}></div>
      <aside
        className="absolute top-0 right-0 h-full bg-[#F5F3EF] shadow-lift animate-slide-in overflow-hidden flex flex-col"
        style={{ width: `min(${width}px, 95vw)` }}
      >
        {children}
      </aside>
    </div>
  );
}

// --- TextField (uncontrolled-friendly) ---
function TextField({ label, hint, error, icon, suffix, className = "", inputClassName = "", as = "input", ...props }) {
  const C = as;
  return (
    <label className={`block ${className}`}>
      {label && <span className="block text-[12px] font-semibold text-[#1A1A1A] mb-1">{label}</span>}
      <span className={`flex items-center gap-2 bg-white rounded-lg ring-1 ${error ? "ring-red-400" : "ring-[#E3DFD5]"} focus-within:ring-2 focus-within:ring-[#3D3530] px-3 h-10 transition-all`}>
        {icon && <Icon name={icon} size={18} className="text-[#9B948D]" />}
        <C className={`flex-1 bg-transparent outline-none text-sm placeholder:text-[#9B948D] ${inputClassName}`} {...props} />
        {suffix}
      </span>
      {(hint || error) && <span className={`block text-[11px] mt-1 ${error ? "text-red-600" : "text-[#9B948D]"}`}>{error || hint}</span>}
    </label>
  );
}

// --- Empty state ---
function Empty({ icon = "inbox", title, sub, action }) {
  return (
    <div className="flex flex-col items-center justify-center text-center py-12 px-6">
      <div className="w-14 h-14 rounded-lg bg-[#EAE5DA] text-[#6B6560] flex items-center justify-center mb-4">
        <Icon name={icon} size={26} />
      </div>
      <p className="font-display text-title-md text-[#1A1A1A]">{title}</p>
      {sub && <p className="text-body-sm text-[#6B6560] mt-1 max-w-sm">{sub}</p>}
      {action && <div className="mt-4">{action}</div>}
    </div>
  );
}

// --- Sparkline ---
function Sparkline({ data, width = 120, height = 36, stroke="#3D3530", fill = "rgba(0,119,237,0.12)" }) {
  if (!data || !data.length) return null;
  const max = Math.max(...data), min = Math.min(...data);
  const r = max - min || 1;
  const pts = data.map((d, i) => {
    const x = (i / (data.length - 1)) * (width - 2) + 1;
    const y = height - 2 - ((d - min) / r) * (height - 6);
    return [x, y];
  });
  const line = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  const area = line + ` L${(width - 1).toFixed(1)},${(height - 1).toFixed(1)} L1,${(height - 1).toFixed(1)} Z`;
  return (
    <svg width={width} height={height} className="block">
      <path d={area} fill={fill} />
      <path d={line} fill="none" stroke={stroke} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// --- Bar chart (simple) ---
function BarChart({ data, height = 160, format }) {
  const max = Math.max(...data.map(d => d.value)) || 1;
  return (
    <div className="flex items-end gap-2" style={{ height }}>
      {data.map((d, i) => (
        <div key={i} className="flex-1 flex flex-col items-center gap-1.5 group">
          <span className="text-[10px] font-mono text-[#6B6560] opacity-0 group-hover:opacity-100 transition-opacity">
            {format ? format(d.value) : d.value}
          </span>
          <div
            className={`w-full rounded-t-md transition-all ${d.highlight ? "bg-[#3D3530]" : "bg-[#E3DFD5] group-hover:bg-[#6B6157]"}`}
            style={{ height: `${(d.value / max) * 90 + 6}%` }}
          ></div>
          <span className="text-[10px] text-[#6B6560]">{d.label}</span>
        </div>
      ))}
    </div>
  );
}

// --- DonutChart (allocation) ---
function DonutChart({ data, size = 180, thickness = 22, centerLabel, centerValue }) {
  const r = size / 2 - thickness / 2 - 2;
  const c = 2 * Math.PI * r;
  let offset = 0;
  const total = data.reduce((s, d) => s + d.pct, 0) || 100;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="-rotate-90">
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#eef2ff" strokeWidth={thickness} />
      {data.map((d, i) => {
        const seg = (d.pct / total) * c;
        const dash = `${seg} ${c - seg}`;
        const el = (
          <circle key={i}
            cx={size / 2} cy={size / 2} r={r}
            fill="none" stroke={d.color} strokeWidth={thickness}
            strokeDasharray={dash}
            strokeDashoffset={-offset}
            strokeLinecap="butt"
          />
        );
        offset += seg;
        return el;
      })}
      {(centerLabel || centerValue) && (
        <g transform={`rotate(90 ${size / 2} ${size / 2})`}>
          {centerValue && (
            <text x="50%" y="48%" textAnchor="middle" className="fill-[#1A1A1A]" style={{ fontFamily: "Lexend", fontWeight: 700, fontSize: 22 }}>
              {centerValue}
            </text>
          )}
          {centerLabel && (
            <text x="50%" y="64%" textAnchor="middle" className="fill-on-surface-variant" style={{ fontFamily: "Inter", fontSize: 11, letterSpacing: 0.5 }}>
              {centerLabel}
            </text>
          )}
        </g>
      )}
    </svg>
  );
}

// --- Progress ring ---
function ProgressRing({ value = 50, size = 64, thickness = 6, label, sub, dark = false }) {
  const r = size / 2 - thickness / 2 - 1;
  const c = 2 * Math.PI * r;
  const offset = c - (value / 100) * c;
  const trackColor = dark ? "rgba(255,255,255,0.12)" : "#E3DFD5";
  const fillColor  = dark ? "#FFFFFF"                : "#3D3530";
  const labelColor = dark ? "#FFFFFF"                : "#1A1A1A";
  const subColor   = dark ? "rgba(255,255,255,0.55)" : "#6B6560";
  return (
    <div className="relative inline-flex items-center justify-center" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={r} fill="none" strokeWidth={thickness} stroke={trackColor} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" strokeWidth={thickness}
          stroke={fillColor} strokeDasharray={c} strokeDashoffset={offset}
          strokeLinecap="round" style={{ transition: "stroke-dashoffset .6s cubic-bezier(.2,.7,.2,1)" }} />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="font-display font-bold" style={{ fontSize: Math.max(11, size * 0.28), color: labelColor }}>{label ?? value + "%"}</span>
        {sub && <span className="text-[9px] font-mono uppercase tracking-wider" style={{ color: subColor }}>{sub}</span>}
      </div>
    </div>
  );
}

// --- Stat tile ---
function Stat({ label, value, sub, trend, icon, tone = "blue" }) {
  const tones = {
    blue:   "bg-[#F0EDE8] text-[#2A2420]",
    green:  "bg-emerald-50 text-emerald-700",
    amber:  "bg-amber-50 text-amber-700",
    purple: "bg-fuchsia-50 text-fuchsia-700",
    slate:  "bg-[#EAE5DA] text-[#6B6560]"
  };
  return (
    <div className="flex flex-col gap-3">
      <div className="flex items-center justify-between">
        {icon && <div className={`w-9 h-9 rounded-lg flex items-center justify-center ${tones[tone]}`}><Icon name={icon} size={18} weight={500} /></div>}
        {typeof trend === "number" && (
          <span className={`inline-flex items-center gap-0.5 text-[11px] font-bold ${trend >= 0 ? "text-emerald-600" : "text-red-600"}`}>
            <Icon name={trend >= 0 ? "trending_up" : "trending_down"} size={14} />
            {trend > 0 ? "+" : ""}{trend}%
          </span>
        )}
      </div>
      <div>
        <p className="text-[11px] uppercase tracking-wider text-[#6B6560] font-semibold">{label}</p>

function ChipToggle({ active, onClick, children, icon }) {
  return (
    <button onClick={onClick}
      className={`inline-flex items-center gap-1.5 h-8 px-3 rounded-full text-[12.5px] font-medium transition-all

          : "bg-white text-[#6B6560] ring-1 ring-[#E3DFD5] hover:bg-[#F5F3EF]"}`}>
      {icon && <Icon name={icon} size={14} />}
      {children}
    </button>
  );
}

// --- Toast bus ---
const ToastCtx = createContext(null);
function ToastProvider({ children }) {
  const [items, setItems] = useState([]);
  const push = useCallback((msg, opts = {}) => {
    const id = Math.random().toString(36).slice(2);
    setItems(prev => [...prev, { id, msg, tone: opts.tone || "info", icon: opts.icon }]);
    setTimeout(() => setItems(prev => prev.filter(x => x.id !== id)), opts.duration || 3000);
  }, []);
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="fixed bottom-6 right-6 z-[60] flex flex-col gap-2 items-end">
        {items.map(t => {
          const tones = {
            info:    "bg-[#1A1A1A] text-white",
            success: "bg-emerald-600 text-white",
            warn:    "bg-amber-500 text-white",
            error:   "bg-red-600 text-white"
          };
          return (
            <div key={t.id} className={`pointer-events-auto px-4 py-2.5 rounded-lg shadow-lift flex items-center gap-2 animate-slide-in ${tones[t.tone]}`}>
              {t.icon && <Icon name={t.icon} size={18} />}
              <span className="text-sm font-medium">{t.msg}</span>
            </div>
          );
        })}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

// Currency formatter (VND short)
function vnd(value, unit = "M") {
  if (unit === "M") {
    if (value >= 1000) return (value / 1000).toFixed(1).replace(/\.0$/, "") + " tỷ";
    return value.toLocaleString("vi-VN") + " tr";
  }
  return value;
}

  if (expanded) {

        onCollapse={() => setExpanded(false)}
        onClose={() => { setExpanded(false); onClose(); }}

  return (
    <div className="fixed inset-0 z-[55] animate-fade-in">

// =============== SUB-NAV (Level 2 dropdown + Level 3 tabs) ===============
// Level 2 = group -> dropdown (shown when a compass has >1 group, or one named group).
// Level 3 = module -> tabs rendered below the header bar.
const GROUP_TONE = {
  primary: { badge: "bg-[#2A2420] text-white",            btn: "bg-[#F0EDE8] text-[#2A2420] ring-[#E3DFD5] hover:bg-[#E3DFD5]" },
  neutral: { badge: "bg-on-surface text-white",                 btn: "bg-[#EAE5DA] text-[#1A1A1A] ring-[#E3DFD5] hover:bg-[#E3DFD5]" },
  green:   { badge: "bg-vnd-accent-green text-[#0D0D0D]", btn: "bg-emerald-50 text-emerald-700 ring-emerald-200 hover:bg-emerald-100" },
  purple:  { badge: "bg-fuchsia-600 text-white",                btn: "bg-fuchsia-50 text-fuchsia-700 ring-fuchsia-200 hover:bg-fuchsia-100" },
  amber:   { badge: "bg-amber-500 text-white",                  btn: "bg-amber-50 text-amber-700 ring-amber-200 hover:bg-amber-100" }
};

function GroupDropdown({ groups, activeGroup, route, onPick, onNavigate }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [open]);
  const tone = GROUP_TONE[activeGroup.tone] || GROUP_TONE.primary;
  const activeModule = activeGroup.modules.find(m => m.id === route);
  return (
    <div className="relative shrink-0" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className={`inline-flex items-center gap-2 h-9 pl-1.5 pr-2.5 rounded-lg ring-1 transition-colors ${tone.btn}`}>
        <span className={`inline-flex items-center h-6 px-2 rounded-md text-[10px] font-bold uppercase tracking-[0.12em] ${tone.badge}`}>{activeGroup.id}</span>
        <span className="text-[13px] font-display font-semibold">{activeGroup.label}</span>
        {activeModule && (
          <>
            <span className="text-[#6B6560]/40">·</span>
            <span className="text-[13px] font-display font-medium text-[#6B6560]">{activeModule.label}</span>
          </>
        )}
        <Icon name="expand_more" size={18} className={`transition-transform ${open ? "rotate-180" : ""}`} />
      </button>
      {open && (
        <div className="absolute z-40 mt-2 left-0 w-[320px] rounded-lg bg-white shadow-lift ring-1 ring-[#E3DFD5] p-1.5 origin-top-left max-h-[72vh] overflow-y-auto scrollbar-thin">
          {groups.map((g, gi) => {
            const t = GROUP_TONE[g.tone] || GROUP_TONE.primary;
            return (
              <div key={g.id} className={gi > 0 ? "mt-1 pt-1 border-t border-[#E3DFD5]" : ""}>
                <div className="flex items-center gap-2 px-2.5 pt-2 pb-1.5">
                  <span className={`inline-flex items-center h-5 px-1.5 rounded-md text-[9.5px] font-bold uppercase tracking-[0.12em] ${t.badge}`}>{g.id}</span>
                  <span className="text-[12px] font-display font-semibold text-[#1A1A1A]">{g.label}</span>
                </div>
                <ul className="space-y-0.5">
                  {g.modules.map(m => {
                    const sel = m.id === route;
                    const coming = m.comingSoon;
                    return (
                      <li key={m.id}>
                        <button disabled={coming}
                          onClick={() => { if (!coming) { onNavigate(m.id); setOpen(false); } }}
                          className={`w-full flex items-center gap-2.5 pl-2.5 pr-2 py-2 rounded-lg text-left transition-colors
                            ${coming ? "opacity-50 cursor-not-allowed" : sel ? "bg-[#F0EDE8]" : "hover:bg-[#F5F3EF]"}`}>
                          <Icon name={m.icon} size={18} className={sel ? "text-[#2A2420]" : "text-[#6B6560]"} filled={sel} />
                          <span className="flex-1 min-w-0">
                            <span className="flex items-center gap-1.5">
                              <span className={`text-[13px] font-medium truncate ${sel ? "text-[#2A2420]" : "text-[#1A1A1A]"}`}>{m.label}</span>
                              {coming && <span className="inline-flex items-center px-1.5 h-4 rounded-full bg-amber-100/80 text-amber-800 text-[9.5px] font-bold uppercase tracking-wider">Soon</span>}
                            </span>
                            {m.sub && <span className="block text-[11px] text-[#6B6560] truncate">{m.sub}</span>}
                          </span>
                          {sel && <Icon name="check" size={16} className="text-[#2A2420] shrink-0" />}
                        </button>
                      </li>
                    );
                  })}
                </ul>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

  return (
    <li className={`flex items-center gap-3 py-2.5 rounded-lg transition-all hover:bg-[#F5F3EF] group px-1 ${done ? "opacity-45" : ""}`}>

        className={`w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all
          ${done ? "bg-vnd-accent-green border-vnd-accent-green text-white" : "border-[#C8C1B5] hover:border-[#3D3530]"}`}>
        {done && <Icon name="check" size={11} weight={700} />}
      </button>
      <span className="w-7 h-7 rounded-lg bg-[#F5F3EF] text-[#6B6560] flex items-center justify-center flex-shrink-0">

          {task.nac && <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full bg-amber-50 text-amber-700 text-[10px] font-bold"><Icon name="campaign" size={10} />NAC</span>}

function CompassHealthCard({ c, onNavigate }) {

          <Icon name={c.icon} size={16} filled />
        </span>
        {c.alert && <span className="w-2 h-2 rounded-full bg-amber-500 ring-2 ring-white mt-1"></span>}
      </div>
      <div className="flex items-end justify-between gap-1">
        <div className="min-w-0">
          <p className={`text-[13px] font-bold ${meta.text}`}>{c.label}</p>
          <p className="text-[11px] text-[#9B948D] truncate mt-0.5">{c.detail}</p>

        <svg width="46" height="46" viewBox="0 0 52 52" className="-mb-0.5 flex-shrink-0">
          <circle cx="26" cy="26" r={radius} fill="none" stroke="#E3DFD5" strokeWidth="4" />
          <circle cx="26" cy="26" r={radius} fill="none"
            stroke={meta.color} strokeWidth="4"
            strokeDasharray={`${dash} ${circ}`}

          <text x="26" y="30" textAnchor="middle" fontSize="11" fontWeight="700" fill="#1A1A1A">{c.score}</text>

    </button>
  );
}

<script type="text/babel">
/* global React, window */
const { PIPELINE_STAGES, LEADS, ACTIVE_CLIENTS, INTERACTIONS, ALLOCATION, ONBOARD_STEPS } = window.DSB_DATA;

// ============== CLIENT ZONE WRAPPER ==============
function ScreenDworkClients({ route, onNavigate }) {
  // Profile id lives in the route (dwork/clients/<id>) so the shell can hide
  // the module nav bar on the detail screen.
  const profileId = (route || "").split("/")[2] || null;

  if (profileId) {
    const ClientProfileScreen = window.ClientProfileScreen;
    return <ClientProfileScreen id={profileId} onBack={() => onNavigate("dwork/clients")} />;
  }
  return <ActiveClients onOpen={(id) => onNavigate("dwork/clients/" + id)} />;
}

// ============== LEAD KANBAN ==============
function LeadKanban() {
  const [board, setBoard] = useState(() => {
    const map = {};
    PIPELINE_STAGES.forEach(s => map[s.id] = LEADS.filter(l => l.stage === s.id));
    return map;
  });
  const [dragId, setDragId] = useState(null);
  const [filter, setFilter] = useState({ priority: "all", hot: false, owner: "me" });
  const [detail, setDetail] = useState(null);
  const toast = useToast();

  const onDragStart = (lead) => (e) => {
    setDragId(lead.id);
    e.dataTransfer.effectAllowed = "move";
  };
  const onDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; };
  const onDrop = (stageId) => (e) => {
    e.preventDefault();
    setBoard(prev => {
      const next = { ...prev };
      let moved = null;
      for (const k of Object.keys(next)) {
        const idx = next[k].findIndex(l => l.id === dragId);
        if (idx >= 0) { moved = { ...next[k][idx], stage: stageId }; next[k] = next[k].filter(l => l.id !== dragId); }
      }
      if (moved) next[stageId] = [moved, ...next[stageId]];
      return next;
    });
    setDragId(null);
    toast?.("Đã chuyển stage", { tone: "success", icon: "swap_horiz" });
  };

  const totalValue = Object.values(board).flat().reduce((s, l) => s + l.value, 0);

  return (
    <div className="px-8 py-6">
      <div className="flex items-center justify-between gap-4 mb-4 flex-wrap">
        <FilterBar>
          <ChipToggle active={filter.priority === "all"} onClick={() => setFilter(f => ({ ...f, priority: "all" }))}>Tất cả</ChipToggle>
          <ChipToggle active={filter.priority === "P1"} onClick={() => setFilter(f => ({ ...f, priority: "P1" }))} icon="circle">P1</ChipToggle>
          <ChipToggle active={filter.priority === "P2"} onClick={() => setFilter(f => ({ ...f, priority: "P2" }))} icon="circle">P2</ChipToggle>
          <ChipToggle active={filter.hot} onClick={() => setFilter(f => ({ ...f, hot: !f.hot }))} icon="local_fire_department">Hot only</ChipToggle>
          <div className="w-px h-5 bg-outline-variant mx-1"></div>
          <ChipToggle active={filter.owner === "me"} onClick={() => setFilter(f => ({ ...f, owner: "me" }))} icon="person">Của tôi</ChipToggle>
          <ChipToggle active={filter.owner === "team"} onClick={() => setFilter(f => ({ ...f, owner: "team" }))} icon="groups">Cả team</ChipToggle>
        </FilterBar>
        <div className="flex items-center gap-3 text-[12.5px]">
          <span className="text-[#6B6560]">Pipeline value:</span>
          <span className="font-display font-bold text-[#1A1A1A] text-headline-sm font-mono">{(totalValue / 1000).toFixed(2)} tỷ</span>
          <span className="w-px h-4 bg-outline-variant"></span>
          <Button tone="ghost" size="sm" icon="dashboard">Kanban</Button>
          <Button tone="ghost" size="sm" icon="view_list">List</Button>
        </div>
      </div>

      <div className="grid grid-cols-6 gap-3 min-w-0 overflow-x-auto pb-4 scrollbar-thin">
        {PIPELINE_STAGES.map((s, idx) => {
          const cards = (board[s.id] || []).filter(l =>
            (filter.priority === "all" || l.priority === filter.priority) &&
            (!filter.hot || l.tag === "Hot")
          );
          return (
            <div key={s.id} className="min-w-[260px] flex flex-col"
              onDragOver={onDragOver} onDrop={onDrop(s.id)}>
              <div className={`px-3 py-2.5 rounded-t-lg border ${s.accent} ${s.tint}`}>
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <span className="w-5 h-5 rounded-md bg-white/70 text-[11px] font-bold text-[#1A1A1A] flex items-center justify-center font-mono">{idx + 1}</span>
                    <p className="font-display font-semibold text-[13px] text-[#1A1A1A]">{s.label}</p>
                  </div>
                  <span className="text-[11px] font-mono text-[#6B6560] bg-white/70 rounded-md px-1.5 py-0.5">{cards.length}</span>
                </div>
                <p className="text-[11px] text-[#6B6560] mt-1 font-mono">{s.value}</p>
              </div>
              <div className={`flex-1 min-h-[400px] p-2 space-y-2 bg-[#F5F3EF]/60 rounded-b-lg border border-t-0 ${s.accent}`}>
                {cards.map(l => (
                  <article
                    key={l.id} draggable
                    onClick={() => setDetail(l)}
                    onDragStart={onDragStart(l)}
                    className={`kanban-card bg-white rounded-lg p-3 ring-1 ring-[#E3DFD5] hover:shadow-lift hover:ring-[#C8C1B5] cursor-grab transition-all ${dragId === l.id ? "opacity-50" : ""}`}
                  >
                    <div className="flex items-start justify-between gap-2">
                      <div className="flex items-center gap-2 min-w-0">
                        <Avatar initials={l.avatarSeed} size={28} tone={["blue","green","amber","purple","slate","rose"][LEADS.indexOf(l) % 6]} />
                        <div className="min-w-0">
                          <p className="text-[12.5px] font-semibold text-[#1A1A1A] truncate">{l.name}</p>
                          <p className="text-[10.5px] text-[#6B6560] truncate">{l.company}</p>
                        </div>
                      </div>
                      <PriorityPill level={l.priority} />
                    </div>
                    <div className="flex items-center gap-2 mt-3">
                      <span className="font-mono text-[12.5px] font-bold text-[#1A1A1A]">
                        {l.value >= 1000 ? `${(l.value/1000).toFixed(2)}T` : `${l.value}M`}
                      </span>
                      {l.tag === "Hot" && <Badge tone="red" size="xs" icon="local_fire_department">Hot</Badge>}
                      {l.tag === "VIP" && <Badge tone="purple" size="xs" icon="diamond">VIP</Badge>}
                    </div>
                    <div className="flex items-center justify-between mt-2.5 pt-2.5 border-t border-[#E3DFD5]">
                      <span className="text-[10.5px] text-[#6B6560] truncate">{l.source}</span>
                      <span className="text-[10.5px] text-[#6B6560] font-mono">{l.lastTouch}</span>
                    </div>
                  </article>
                ))}
                <button className="w-full py-2 rounded-lg border border-dashed border-[#E3DFD5] text-[11.5px] text-[#6B6560] hover:bg-white hover:border-[#C8C1B5] hover:text-[#2A2420] transition-colors">
                  + Thêm lead
                </button>
              </div>
            </div>
          );
        })}
      </div>

      <LeadDetailModal lead={detail} onClose={() => setDetail(null)} />
    </div>
  );
}

function LeadDetailModal({ lead, onClose }) {
  if (!lead) return null;
  return (
    <Modal open={!!lead} onClose={onClose} title={lead.name} sub={`${lead.company} · ${lead.id}`}
      size="lg"
      footer={
        <>
          <Button tone="ghost" onClick={onClose}>Đóng</Button>
          <Button tone="outline" icon="event">Đặt lịch</Button>
          <Button tone="primary" icon="arrow_forward">Chuyển stage tiếp</Button>
        </>
      }>
      <div className="grid grid-cols-12 gap-5">
        <div className="col-span-12 md:col-span-7 space-y-4">
          <div className="flex items-center gap-3 flex-wrap">
            <PriorityPill level={lead.priority} />
            <Badge tone="blue" size="sm" icon="source">{lead.source}</Badge>
            {lead.tag === "Hot" && <Badge tone="red" size="sm" icon="local_fire_department">Hot lead</Badge>}
            {lead.nac && <Badge tone="amber" size="sm" icon="campaign">NAC Alert</Badge>}
          </div>
          <div>
            <p className="text-[11px] uppercase tracking-wider text-[#6B6560] font-semibold">Ghi chú gần nhất</p>
            <p className="text-[14px] text-[#1A1A1A] mt-1.5">{lead.note}</p>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <KV label="SĐT" value={lead.phone} icon="call" />
            <KV label="Last touch" value={lead.lastTouch} icon="schedule" />
            <KV label="Giá trị dự kiến" value={`${lead.value >= 1000 ? (lead.value/1000).toFixed(2)+" tỷ" : lead.value+" tr"}`} icon="payments" />
            <KV label="Nguồn" value={lead.source} icon="route" />
          </div>
          <div>
            <p className="text-[11px] uppercase tracking-wider text-[#6B6560] font-semibold mb-2">Action ngắn</p>
            <div className="flex gap-2 flex-wrap">
              <Button size="sm" tone="outline" icon="call">Gọi</Button>
              <Button size="sm" tone="outline" icon="chat">Zalo</Button>
              <Button size="sm" tone="outline" icon="mail">Email</Button>
              <Button size="sm" tone="outline" icon="event">Đặt lịch hẹn</Button>
              <Button size="sm" tone="soft" icon="auto_awesome">AI: soạn outreach</Button>
            </div>
          </div>
        </div>
        <div className="col-span-12 md:col-span-5">
          <div className="rounded-lg bg-[#F5F3EF] p-4">
            <p className="text-[11px] uppercase tracking-wider text-[#6B6560] font-semibold mb-3">Stage hiện tại</p>
            <ol className="space-y-2">
              {PIPELINE_STAGES.map((s, i) => {
                const idx = PIPELINE_STAGES.findIndex(x => x.id === lead.stage);
                const done = i < idx, current = i === idx;
                return (
                  <li key={s.id} className={`flex items-center gap-2.5 text-[12.5px]
                    ${current ? "text-[#1A1A1A] font-semibold" : done ? "text-emerald-700" : "text-[#6B6560]"}`}>
                    <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold
                      ${current ? "bg-[#3D3530] text-white" : done ? "bg-emerald-500 text-white" : "bg-[#EAE5DA] text-[#6B6560]"}`}>
                      {done ? <Icon name="check" size={12} /> : i + 1}
                    </span>
                    <span className="flex-1">{s.label}</span>
                  </li>
                );
              })}
            </ol>
          </div>
        </div>
      </div>
    </Modal>
  );
}

function KV({ label, value, icon }) {
  return (
    <div className="rounded-lg bg-[#F5F3EF]/80 p-3">
      <p className="text-[10px] uppercase tracking-wider text-[#6B6560] font-semibold flex items-center gap-1.5">
        {icon && <Icon name={icon} size={12} />}{label}
      </p>
      <p className="text-[13.5px] font-semibold text-[#1A1A1A] mt-1">{value}</p>
    </div>
  );
}

// ============== ONBOARDING STEPPER ==============
function OnboardingStepper() {
  const [activeCase, setActiveCase] = useState(0);
  const cases = [
    { client: "Trần Ngọc Nhi", id: "ON-441", progress: 57, current: "Risk Profiling", since: "2 ngày" },
    { client: "Phạm Quốc Bảo", id: "ON-440", progress: 28, current: "AML/PEP Check", since: "5 ngày" },
    { client: "Hoàng Thị Mai", id: "ON-438", progress: 86, current: "Cấp tài khoản", since: "Hôm nay" }
  ];
  return (
    <div className="px-8 py-6 grid grid-cols-12 gap-5">
      <Card className="col-span-12 lg:col-span-3 p-3">
        <p className="text-[10px] uppercase tracking-wider text-[#6B6560] font-semibold px-3 mb-2">Onboard đang chạy · 3</p>
        <ul className="space-y-1">
          {cases.map((c, i) => (
            <li key={c.id}>
              <button onClick={() => setActiveCase(i)}
                className={`w-full text-left p-3 rounded-lg transition-all

<script type="text/babel">
/* global React, window */
// ============================================================
// CLIENT PROFILE — detail screen per the DSB sitemap.
// Pinned header (luôn hiển thị) · 4 tabs (DGO · Daccount · Dinvest · Dlink).

const { ACTIVE_CLIENTS, INTERACTIONS, SEGMENT_TO_TIER, TIER_LADDER, CJ_STAGES, NAC_BY_STATE, CP_DATA } = window.DSB_DATA;

// ---------- shared formatting ----------
function trToTy(v) {
  // v in million VND ("tr") → friendly tỷ / tr string
  if (v >= 1000) return (v / 1000).toFixed(2).replace(/\.?0+$/, "") + " tỷ";
  return v.toLocaleString("vi-VN") + " tr";
}
function ageFromDob(dob) {
  if (!dob) return null;
  const d = new Date(dob);
  return Math.floor((Date.now() - d.getTime()) / (365.25 * 24 * 3600 * 1000));
}
function buildProfile(client) {
  const tier = SEGMENT_TO_TIER[client.segment] || "Mass";
  return {
    tier,
    tierIndex: TIER_LADDER.indexOf(tier),
    age: ageFromDob(client.dob),
    cjIndex: CJ_STAGES.findIndex(s => s.key === client.journey),
    nac: client.nac && client.nac !== "none" ? { state: client.nac, ...NAC_BY_STATE[client.nac] } : null
  };
}

// ---------- shared presentational helpers ----------
function CPCard({ title, sub, icon, action, children, className = "" }) {
  return (
    <section className={`bg-white rounded-lg shadow-soft ring-1 ring-[#E3DFD5]/50 p-5 ${className}`}>
      {(title || action) && (
        <div className="flex items-start justify-between gap-3 mb-4">

            {icon && (
              <span className="w-8 h-8 shrink-0 rounded-lg bg-[#F0EDE8] text-[#2A2420] flex items-center justify-center">
                <Icon name={icon} size={18} />

              {sub && <p className="text-[12px] text-[#6B6560] mt-0.5">{sub}</p>}
            </div>
          </div>
          {action}
        </div>
      )}
      {children}
    </section>
  );
}

function CPLabel({ children, className = "" }) {
  return <p className={`text-[11px] uppercase tracking-wider text-[#6B6560] font-semibold ${className}`}>{children}</p>;
}

// inline key/value row (label left · value right)
function KVRow({ label, value, icon, tone }) {
  const toneCls = tone === "pos" ? "text-emerald-700" : tone === "neg" ? "text-red-700" : "text-[#1A1A1A]";
  return (
    <div className="flex items-center justify-between gap-3 py-2 border-b border-[#E3DFD5] last:border-0">
      <span className="text-[12.5px] text-[#6B6560] inline-flex items-center gap-1.5 min-w-0">
        {icon && <Icon name={icon} size={14} className="shrink-0" />}<span className="truncate">{label}</span>
      </span>
      <span className={`text-[13px] font-medium text-right shrink-0 ${toneCls}`}>{value}</span>
    </div>
  );
}

// boxed metric tile
function KVTile({ label, value, sub, tone = "neutral", mono = true }) {
  const ring = {
    neutral: "ring-[#E3DFD5]",
    blue: "ring-[#E3DFD5] bg-[#F0EDE8]/40",
    green: "ring-emerald-200 bg-emerald-50/40",
    amber: "ring-amber-200 bg-amber-50/40",
    purple: "ring-fuchsia-200 bg-fuchsia-50/40",
    red: "ring-red-200 bg-red-50/40"
  }[tone];
  const valColor = tone === "green" ? "text-emerald-700" : tone === "red" ? "text-red-700" : "text-[#1A1A1A]";
  return (
    <div className={`rounded-lg ring-1 p-4 ${ring}`}>
      <CPLabel className="text-[10px]">{label}</CPLabel>
      <p className={`font-display font-bold text-headline-sm mt-1 ${valColor} ${mono ? "font-mono" : ""}`}>{value}</p>
      {sub && <p className="text-[11.5px] text-[#6B6560] mt-1">{sub}</p>}
    </div>
  );
}

// ============================================================
// CONTEXT NAVIGATION (per BRD — max 2 fixed layers)
//  Layer 1: breadcrumb switcher  [Module / Page ▼]  + sibling modules
//  Layer 2: right-sticky "Trong trang này" section index
//  Deeper levels → drawer / detail (handled inside panels).
// ============================================================
const CP_MODULES = [
  { id: "nangluc",  label: "La bàn Hiểu biết",  full: "La Bàn Hiểu Biết",                 icon: "explore" },
  { id: "hanhdong", label: "La bàn Hành động",  full: "La Bàn Hành Động · Giao dịch & sao kê", icon: "bolt" },
  { id: "ketnoi",   label: "La bàn Kết nối",    full: "La Bàn Kết Nối · Quan hệ",     icon: "hub" },
  { id: "taisan",   label: "La bàn Giá trị",    full: "La Bàn Giá Trị · Tài sản & nợ",      icon: "account_balance" }
];

// "Tìm trong hồ sơ" — within-customer command menu (jumps to any section of the module)
function ProfileSearch({ groups, module, onPick, onClose }) {
  const [q, setQ] = useState("");
  const ref = useRef(null);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  const kw = q.trim().toLowerCase();
  const results = [];
  groups.forEach(g => g.items.forEach(it => {
    if (!kw || it.label.toLowerCase().includes(kw) || g.label.toLowerCase().includes(kw)) results.push({ ...it, page: g.label });
  }));
  return (
    <div ref={ref} className="absolute z-40 mt-2 right-0 w-[360px] max-w-[92vw] rounded-lg bg-white shadow-lift ring-1 ring-[#E3DFD5] overflow-hidden animate-fade-in">
      <div className="p-2.5 border-b border-[#E3DFD5]">
        <span className="flex items-center gap-2 h-9 px-2.5 rounded-lg bg-[#F5F3EF] ring-1 ring-[#E3DFD5] focus-within:ring-2 focus-within:ring-[#3D3530]">
          <Icon name="search" size={16} className="text-[#6B6560]" />
          <input autoFocus value={q} onChange={e => setQ(e.target.value)} placeholder={`Tìm trong ${module.label}…`}
            className="no-focus-box flex-1 min-w-0 bg-transparent text-[13px] outline-none border-0 placeholder:text-[#6B6560]/60" />
        </span>
      </div>
      <ul className="max-h-[320px] overflow-y-auto scrollbar-thin p-1.5">
        {results.map(r => (
          <li key={r.id}>
            <button onClick={() => onPick(r.id)} className="w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg hover:bg-[#F5F3EF] text-left transition-colors">
              <Icon name={r.icon} size={16} className="text-[#6B6560] shrink-0" />
              <span className="flex-1 min-w-0">
                <span className="block text-[13px] text-[#1A1A1A] truncate">{r.label}</span>
                <span className="block text-[11px] text-[#6B6560] truncate">{r.page}</span>
              </span>
              <Icon name="arrow_forward" size={15} className="text-[#6B6560]/50 shrink-0" />
            </button>
          </li>
        ))}
        {results.length === 0 && <p className="px-3 py-6 text-center text-[12.5px] text-[#6B6560]">Không tìm thấy mục phù hợp.</p>}
      </ul>
    </div>
  );
}

// ProfilePageNav — Level-2 pill/chip tabs (group switcher at top)
// ProfileLayout — 2-column: left sidebar nav + right content
function ProfilePageNav({ groups, value, onChange }) {
  // Only show group-level pills if more than 1 group
  if (!groups || groups.length <= 1) return null;
  const activeGroup = groups.find(g => g.items.some(it => it.id === value)) || groups[0];
  return (
    <div className="flex items-center gap-1.5 px-4 pt-3 pb-0 flex-wrap">
      {groups.map(g => {
        const active = g.id === activeGroup.id;
        return (
          <button key={g.id}
            onClick={() => { const first = g.items[0]; if (first) onChange(first.id); }}
            className={`inline-flex items-center gap-1.5 h-7 px-3 rounded-full text-[12px] font-semibold transition-all
              ${active
                ? "bg-[#1A1A1A] text-white"
                : "bg-[#EAE5DA] text-[#3D3530] hover:bg-[#E3DFD5]"}`}>
            <Icon name={g.icon} size={13} filled={active} />
            <span>{g.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ProfileLayout — 2-column layout: sticky left sidebar nav + scrollable right content
function ProfileLayout({ module, onModuleChange, groups, value, onChange, children }) {
  const activeGroup = groups.find(g => g.items.some(it => it.id === value)) || groups[0];
  const activeItem = activeGroup.items.find(it => it.id === value) || activeGroup.items[0];
  const hasMultiGroup = groups.length > 1;
  return (
    <div className="flex min-h-0 flex-1">
      {/* Left sidebar nav */}
      <aside className="w-[200px] shrink-0 border-r border-[#E3DFD5] flex flex-col pt-3 pb-4 overflow-y-auto scrollbar-hide">
        {hasMultiGroup ? (
          groups.map(g => {
            const groupActive = g.id === activeGroup.id;
            return (
              <div key={g.id} className="mb-1">
                {/* Group header pill */}
                <button
                  onClick={() => onChange(g.items[0].id)}
                  className={`w-full flex items-center gap-2 px-3 py-1.5 mb-0.5 transition-colors
                    ${groupActive ? "text-[#1A1A1A]" : "text-[#9B948D] hover:text-[#6B6560]"}`}>

          <div className="space-y-0.5 px-2">
            {activeGroup.items.map((it, idx) => {

              const showSection = it.section && it.section !== prevSection;
              return (

// ============== PINNED HEADER ==============
// icon-only action with hover tooltip
function IconAction({ icon, label, tone = "default", onClick }) {
  const tones = {
    primary: "bg-[#3D3530] text-white hover:bg-[#2A2420] shadow-xs",
    default: "bg-white text-[#1A1A1A] ring-1 ring-[#E3DFD5] hover:bg-[#F5F3EF]",
    danger: "bg-red-50 text-red-700 hover:bg-red-100"
  };
  return (
    <div className="relative group/act">
      <button onClick={onClick} aria-label={label}
        className={`w-9 h-9 rounded-lg flex items-center justify-center transition-all active:scale-95 ${tones[tone]}`}>
        <Icon name={icon} size={18} weight={500} />
      </button>

// ============== SCREEN ==============
function ClientProfileScreen({ id, onBack }) {
  const client = ACTIVE_CLIENTS.find(c => c.id === id);
  const [tab, setTab] = useState("taisan");
  const [logOpen, setLogOpen] = useState(null);
  const toast = useToast();
  useEffect(() => {
    const m = document.querySelector("main");
    if (m) m.scrollTop = 0;
  }, [id]);
  if (!client) return null;
  const p = buildProfile(client);

  const handleAction = (kind) => {
    if (kind === "call" || kind === "log" || kind === "advise") { setLogOpen(kind === "advise" ? "advise" : kind); return; }

              { id: "nangluc",  label: "La bàn Hiểu biết",  icon: "explore", soon: true },
              { id: "hanhdong", label: "La bàn Hành động",  icon: "bolt" },
              { id: "ketnoi",   label: "La bàn Kết nối",    icon: "hub" },
              { id: "taisan",   label: "La bàn Giá trị",    icon: "account_balance" }
            ].map(t => {
              const a = tab === t.id;
              return (
                <button key={t.id} onClick={() => !t.soon && setTab(t.id)}
                  className={`group relative inline-flex items-center gap-2 h-11 px-4 whitespace-nowrap text-[13.5px] font-display transition-all
                    ${t.soon ? "opacity-40 cursor-not-allowed" : ""}
                    ${a ? "text-[#1A1A1A] font-bold" : "text-[#6B6560] font-medium hover:text-[#1A1A1A]"}`}>
                  <Icon name={t.icon} size={16} filled={a} />
                  <span>{t.label}</span>
                  {t.soon && <span className="inline-flex items-center px-1.5 h-4 rounded-full bg-[#F0EDE8] text-[#7C4A1E] text-[9px] font-bold uppercase tracking-wider">Soon</span>}
                  <span className={`absolute left-0 right-0 -bottom-0.5 h-[3px] rounded-t-full transition-colors ${a ? "bg-[#1A1A1A]" : "bg-transparent group-hover:bg-[#E3DFD5]"}`}></span>
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Tab content — ProfileLayout handles its own padding/layout */}
      <div className="flex flex-col" style={{minHeight: "calc(100vh - 200px)"}}>
        {tab === "nangluc" && window.TabNangLuc && <window.TabNangLuc client={client} p={p} />}
        {tab === "hanhdong" && window.TabHanhDong && <window.TabHanhDong client={client} p={p} />}
        {tab === "ketnoi" && window.TabKetNoi && <window.TabKetNoi client={client} p={p} />}
        {tab === "taisan" && window.TabTaiSan && <window.TabTaiSan client={client} p={p} />}
      </div>

      {/* Log modal */}
      <Modal open={!!logOpen} onClose={() => setLogOpen(null)}
        title={`Log touchpoint — ${client.name}`}
        sub="Template tự sinh theo context NAC · điền thêm ghi chú để hoàn tất"
        footer={
          <>
            <Button tone="ghost" onClick={() => setLogOpen(null)}>Huỷ</Button>
            <Button tone="primary" icon="check" onClick={() => { setLogOpen(null); toast?.("Đã log tương tác vào Interaction History", { tone: "success", icon: "check_circle" }); }}>Lưu & log</Button>
          </>
        }>
        <div className="space-y-4">
          <div className="flex gap-2 flex-wrap">
            {[["call", "Gọi", "call"], ["zalo", "Zalo", "chat"], ["email", "Email", "mail"], ["advise", "Tư vấn", "forum"]].map(([k, l, ic]) => (
              <ChipToggle key={k} active={logOpen === k} onClick={() => setLogOpen(k)} icon={ic}>{l}</ChipToggle>
            ))}
          </div>
          <div className="grid grid-cols-2 gap-3">
            <TextField label="Outcome" defaultValue="Completed" icon="check" />
            <TextField label="Thời lượng" defaultValue="12 min" icon="schedule" />
          </div>
          <TextField as="textarea" label="Ghi chú" rows="4" defaultValue="Đã trao đổi về phân bổ Q4. KH quan tâm tăng tỉ trọng bond. Hẹn callback thứ Sáu 14:30." inputClassName="min-h-[88px] py-2" />
          <label className="flex items-center gap-2 text-[12.5px]">
            <input type="checkbox" defaultChecked className="rounded border-[#E3DFD5]" />

          </label>
        </div>
      </Modal>
    </div>
  );
}

Object.assign(window, {
  ClientProfileScreen, CPCard, CPLabel, KVRow, KVTile, buildProfile, trToTy,
  ProfilePageNav, ProfileLayout
});

                  <span className={`text-[13px] flex-1 ${isCur || isNext ? "font-semibold" : "text-[#6B6560]"}`}>{t}</span>
                  {isCur && <Badge tone="blue" size="xs">Hiện tại</Badge>}
                  {isNext && <Badge tone="purple" size="xs">Mục tiêu</Badge>}
                </li>
              );
            })}
          </ol>
        </CPCard>
      </div>
    );
  }
  function IdpTierPanel() {
    const idp = CP_DATA.idp;
    return (
      <CPCard title="Lộ trình lên tier tiếp theo" sub="Điều kiện & tiến độ" icon="trending_up">
        <div className="flex items-center gap-3 mb-4 flex-wrap">
          <Badge tone="blue" size="md">{idp.current}</Badge>
          <Icon name="arrow_forward" size={18} className="text-[#6B6560]" />
          <Badge tone="purple" size="md" icon="workspace_premium">{idp.next}</Badge>
        </div>
        <div className="rounded-lg bg-[#F5F3EF]/70 ring-1 ring-[#E3DFD5] p-3 mb-4">
          <CPLabel className="mb-1">Điều kiện lên tier</CPLabel>
          <p className="text-[13px] text-[#1A1A1A]">{idp.requirement}</p>
        </div>
        <div className="flex items-center justify-between mb-1.5"><CPLabel>Tiến độ lên tier</CPLabel><span className="font-mono text-[12px] font-bold text-[#2A2420]">{idp.tierProgress}%</span></div>
        <div className="h-2.5 bg-[#EAE5DA] rounded-full overflow-hidden mb-3"><div className="h-full bg-[#3D3530] rounded-full" style={{ width: idp.tierProgress + "%" }}></div></div>
        <div className="rounded-lg bg-[#F0EDE8]/60 ring-1 ring-[#E3DFD5] p-3 flex items-start gap-2">
          <Icon name="lightbulb" size={16} className="text-[#2A2420] mt-0.5" />
          <p className="text-[12px] text-[#1A1A1A]">{idp.note}</p>
        </div>
      </CPCard>
    );
  }
  function IdpContractPanel() {
    const idp = CP_DATA.idp;
    return (
      <CPCard title="Tiến độ hợp đồng chuyển đổi" sub="Chuyển đổi sang gói/track mục tiêu" icon="description">
        <div className="flex items-center gap-4 mb-4">
          <ProgressRing value={idp.contractProgress} size={92} thickness={9} sub="Hoàn tất" />
          <div className="flex-1">
            <p className="text-[13px] font-semibold text-[#1A1A1A]">Hợp đồng nâng hạng KHL Pro</p>
            <p className="text-[12px] text-[#6B6560] mt-1">Đã hoàn tất {idp.contractProgress}% các bước hồ sơ & phê duyệt.</p>
          </div>
        </div>
        <ul className="space-y-2">
          {[["Thu thập hồ sơ bổ sung", true], ["Thẩm định nội bộ", true], ["Ký phụ lục hợp đồng", false], ["Kích hoạt gói mới", false]].map(([s, done], i) => (
            <li key={i} className="flex items-center gap-2.5 p-2.5 rounded-lg ring-1 ring-[#E3DFD5]">
              <Icon name={done ? "check_circle" : "radio_button_unchecked"} size={18} className={done ? "text-emerald-600" : "text-[#6B6560]"} filled={!!done} />
              <span className={`text-[12.5px] ${done ? "font-medium" : "text-[#6B6560]"}`}>{s}</span>
            </li>
          ))}
        </ul>
      </CPCard>
    );
  }

  // ---------- container ----------
  function TabDgo({ client, p }) {
    const HsCaNhan = window.HsCaNhan;
    const ProfileLayout = window.ProfileLayout;
    const h = CP_DATA.hsCaNhan;
    const groups = [
      { id: "hscn", label: "Hồ sơ cá nhân", icon: "contact_page", items: [
        { id: "hscn:basic", label: "Thông tin cơ bản", icon: "person" },
        { id: "hscn:accounts", label: "Danh sách tài khoản", icon: "account_balance", count: h.baseAccounts.length + h.fundCertAccounts.length },
        { id: "hscn:auth", label: "Danh sách uỷ quyền", icon: "manage_accounts", count: h.authorizations.length },
        { id: "hscn:beneficiary", label: "Tài khoản thụ hưởng", icon: "savings", count: h.bankAccounts.length },
        { id: "hscn:events", label: "Life events", icon: "event" }
      ] },
      { id: "kyc", label: "KYC profile", icon: "fact_check", items: [
        { id: "kyc:need", label: "Need map", icon: "travel_explore" },
        { id: "kyc:risk", label: "Risk map", icon: "radar" },
        { id: "kyc:xmap", label: "X-map", icon: "hub" }
      ] },
      { id: "inv", label: "Hồ sơ đầu tư", icon: "insights", items: [
        { id: "inv:track", label: "Investment track", icon: "account_tree" },
        { id: "inv:risk", label: "Risk profile + suitability", icon: "rule" },
        { id: "inv:wisdom", label: "Wisdom / experience", icon: "emoji_objects" },
        { id: "inv:exp", label: "Kinh nghiệm đầu tư", icon: "history_edu" }
      ] },
      { id: "idp", label: "Hành trình phát triển (IDP)", icon: "trending_up", items: [
        { id: "idp:position", label: "Vị thế đầu tư hiện tại", icon: "my_location" },
        { id: "idp:tier", label: "Lộ trình lên tier", icon: "stairs" },
        { id: "idp:contract", label: "Tiến độ HĐ chuyển đổi", icon: "description" }
      ] }
    ];
    const [active, setActive] = useState("hscn:basic");
    const render = () => {
      switch (active) {
        case "hscn:basic": return <HsCaNhan client={client} sub="basic" />;
        case "hscn:accounts": return <HsCaNhan client={client} sub="accounts" />;
        case "hscn:auth": return <HsCaNhan client={client} sub="auth" />;
        case "hscn:beneficiary": return <HsCaNhan client={client} sub="beneficiary" />;
        case "hscn:events": return <LifeEventsPanel />;
        case "kyc:need": return <NeedMapPanel />;
        case "kyc:risk": return <RiskMapPanel />;
        case "kyc:xmap": return <XMapPanel />;
        case "inv:track": return <InvestTrackPanel />;
        case "inv:risk": return <RiskSuitabilityPanel />;
        case "inv:wisdom": return <WisdomPanel />;
        case "inv:exp": return <ExperiencePanel />;
        case "idp:position": return <IdpPositionPanel client={client} />;
        case "idp:tier": return <IdpTierPanel />;
        case "idp:contract": return <IdpContractPanel />;
        default: return null;
      }
    };
    return <ProfileLayout groups={groups} value={active} onChange={setActive}>{render()}</ProfileLayout>;
  }

  window.TabDgo = TabDgo;
})();

</script>
<script type="text/babel">
/* global React, window */
// ============== DGO › HỒ SƠ CÁ NHÂN (4 nested tabs) ==============
// Thông tin cơ bản · Danh sách tài khoản · Danh sách uỷ quyền · Tài khoản thụ hưởng
// Report-style layouts (matching production screens) refined to the DSB system.
(function () {
  const { CP_DATA } = window.DSB_DATA;
  const NA = <span className="text-[#6B6560]/55 italic font-normal">Chưa có thông tin</span>;

  // ---- reusable report table ----
  function ReportTable({ title, icon, columns, rows, searchKey, searchPlaceholder = "Tìm kiếm", empty, action }) {
    const [q, setQ] = useState("");
    const filtered = !q || !searchKey ? rows : rows.filter(r => String(r[searchKey] || "").toLowerCase().includes(q.toLowerCase()));
    return (
      <section className="bg-white rounded-lg shadow-soft ring-1 ring-[#E3DFD5]/50 overflow-hidden">
        <header className="flex items-center justify-between gap-3 px-5 pt-4 pb-3">
          <div className="flex items-center gap-2.5">
            <span className="w-8 h-8 rounded-lg bg-[#F0EDE8] text-[#2A2420] flex items-center justify-center"><Icon name={icon} size={18} /></span>
            <h3 className="font-display text-title-md text-[#1A1A1A]">{title}</h3>
            <span className="text-[11px] font-bold rounded-full px-2 py-0.5 bg-[#EAE5DA] text-[#6B6560]">{rows.length}</span>
          </div>
          {action}
        </header>
        {searchKey && (
          <div className="px-5 pb-3">
            <div className="max-w-xs">
              <TextField icon="search" placeholder={searchPlaceholder} value={q} onChange={(e) => setQ(e.target.value)} />
            </div>
          </div>
        )}
        <div className="overflow-x-auto scrollbar-thin">
          {filtered.length === 0 ? (
            <Empty icon={empty?.icon || "inbox"} title={empty?.title || "No Data"} sub={empty?.sub} />
          ) : (
            <table className="w-full text-[12.5px] border-t border-[#E3DFD5]">
              <thead className="bg-[#F5F3EF]/70 text-[10.5px] uppercase tracking-wide text-[#6B6560]">
                <tr>
                  {columns.map((c, i) => (
                    <th key={i} className={`font-semibold py-2.5 px-3 whitespace-nowrap ${c.align === "center" ? "text-center" : c.align === "right" ? "text-right" : "text-left"} ${c.thClassName || ""}`}>{c.label}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-[#E3DFD5]/60">
                {filtered.map((r, ri) => (
                  <tr key={ri} className="hover:bg-[#F0EDE8]/30 transition-colors">
                    {columns.map((c, ci) => (
                      <td key={ci} className={`py-2.5 px-3 align-middle ${c.align === "center" ? "text-center" : c.align === "right" ? "text-right" : "text-left"} ${c.tdClassName || ""}`}>
                        {c.render ? c.render(r, ri) : r[c.key]}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </section>
    );
  }

  const statusBadge = (v, tone = "green") => <Badge tone={tone} size="sm">{v}</Badge>;
  const idxCol = { label: "#", align: "center", thClassName: "w-10", tdClassName: "text-[#6B6560] font-mono", render: (_r, i) => i + 1 };
  const actionCol = {
    label: "Thao tác", align: "center", thClassName: "w-24",
    render: () => (
      <div className="inline-flex items-center gap-1">
        <button className="w-7 h-7 rounded-md text-[#6B6560] hover:bg-[#EAE5DA] hover:text-[#2A2420] flex items-center justify-center" title="Xem chi tiết"><Icon name="visibility" size={16} /></button>
        <button className="w-7 h-7 rounded-md text-[#6B6560] hover:bg-[#EAE5DA] hover:text-[#2A2420] flex items-center justify-center" title="Thêm"><Icon name="more_horiz" size={16} /></button>
      </div>
    )
  };
  const accountColumns = [
    idxCol,
    { label: "Số tài khoản", render: (r) => <span className="font-mono font-semibold text-[#1A1A1A]">{r.no}</span> },
    { label: "Loại TK giao dịch", key: "type" },
    { label: "Gói tài khoản", render: (r) => <span className="text-[#1A1A1A]">{r.pkg}</span> },
    { label: "NVCS", render: (r) => <span className="font-mono text-[#6B6560]">{r.nvcs}</span> },
    { label: "TT tài khoản", align: "center", render: (r) => statusBadge(r.status, "green") },
    { label: "Trạng thái VSD", align: "center", render: (r) => r.vsd === "—" ? <span className="text-[#6B6560]">—</span> : statusBadge(r.vsd, "blue") },
    { label: "TT hoàn thiện", align: "center", render: (r) => statusBadge(r.done, "green") },
    { label: "Ngày activate TK", render: (r) => <span className="font-mono text-[#6B6560] whitespace-nowrap">{r.activatedAt}</span> },
    { label: "Ngày khởi tạo TK", render: (r) => <span className="font-mono text-[#6B6560] whitespace-nowrap">{r.createdAt}</span> },
    actionCol
  ];

  // ===== TAB 1 · Thông tin cơ bản =====
  function TabBasic({ client }) {
    const d = CP_DATA.hsCaNhan;
    const id = d.identity, addr = d.address, sys = d.system;
    const fmtDob = (s) => { if (!s) return NA; const [y, m, dd] = s.split("-"); return `${dd}/${m}/${y}`; };
    const sb = (o) => o?.state === "ok" ? <Badge tone="green" size="sm" icon="check">{o.v}</Badge> : <span className="font-medium">{o?.v || ""}</span>;
    return (
      <div>
        <div className="flex items-center justify-end mb-3">
          <Button tone="outline" size="sm" icon="download">Tải hợp đồng</Button>
        </div>
        <div className="grid grid-cols-12 gap-4">
          <CPCard title="Định danh khách hàng" icon="badge" className="col-span-12 lg:col-span-5">
            <KVRow label="Tên khách hàng" value={<span className="font-semibold">{client.name}</span>} />
            <KVRow label="Loại KH" value="Cá nhân trong nước" />
            <KVRow label="Quốc tịch" value="Việt Nam" />
            <KVRow label="Giới tính / Loại hình" value={client.gender} />
            <KVRow label="Ngày tháng năm sinh" value={fmtDob(client.dob)} />
            <KVRow label="CMND / CCCD / Hộ chiếu" value={<span className="font-mono">{client.cccd}</span>} />
            <KVRow label="Ngày cấp" value={id.idIssueDate} />
            <KVRow label="Nơi cấp" value={id.idIssuePlace} />
            <KVRow label="Ngày hết hạn" value={id.idExpiry} />
            <KVRow label="Email" value={client.email} />
            <KVRow label="SĐT di động" value={<span className="font-mono">{client.phone}</span>} />
            <KVRow label="SĐT cố định" value={id.landline || NA} />
          </CPCard>

          <CPCard title="Địa chỉ liên hệ" icon="location_on" className="col-span-12 lg:col-span-3">
            <div className="rounded-lg bg-[#F5F3EF]/60 ring-1 ring-[#E3DFD5] p-3.5 mb-2">
              <CPLabel className="mb-1">Địa chỉ cụ thể</CPLabel>
              <p className="text-[13px] text-[#1A1A1A] leading-snug">{addr.detail}, {addr.ward}, {addr.cityFull}</p>
            </div>
            <KVRow label="Phường / Xã" value={addr.ward} />
            <KVRow label="Tỉnh / Thành phố" value={addr.cityFull} />
            <KVRow label="Khu vực CSKH" value={`${client.district}, ${client.city}`} />
          </CPCard>

          <CPCard title="Trạng thái hệ thống" icon="dns" className="col-span-12 lg:col-span-4">
            <KVRow label="Tên đăng nhập" value={<span className="font-mono">{sys.username}</span>} />
            <KVRow label="CustomerId" value={<span className="font-mono">{sys.customerId}</span>} />
            <KVRow label="Số lưu ký" value={<span className="font-mono">{sys.custodyNo}</span>} />
            <KVRow label="TT xác thực KH" value={sb(sys.verifyKH)} />
            <KVRow label="TT xác thực C06" value={sb(sys.verifyC06)} />
            <KVRow label="TT khách hàng" value={sb(sys.custStatus)} />
            <KVRow label="TT hợp đồng" value={sb(sys.contractStatus)} />
            <KVRow label="TT đặt lệnh" value={<Badge tone="blue" size="sm">{sys.orderStatus.v}</Badge>} />
            <KVRow label="SID" value={sys.sid ? <span className="font-mono">{sys.sid}</span> : NA} />
            <KVRow label="PCOD" value={sys.pcod ? <span className="font-mono">{sys.pcod}</span> : NA} />
          </CPCard>
        </div>
      </div>
    );
  }

  // ===== TAB 2 · Danh sách tài khoản =====
  function TabAccounts() {
    const d = CP_DATA.hsCaNhan;
    return (
      <div className="space-y-4">
        <ReportTable title="Danh sách tài khoản cơ sở" icon="account_balance" columns={accountColumns} rows={d.baseAccounts}
          searchKey="no" searchPlaceholder="Số tài khoản" />
        <ReportTable title="Danh sách tài khoản phái sinh" icon="show_chart" columns={accountColumns} rows={d.derivativeAccounts}
          searchKey="no" searchPlaceholder="Số tài khoản" empty={{ icon: "inbox", title: "No Data", sub: "Khách hàng chưa có tài khoản phái sinh." }} />
        <ReportTable title="Tài khoản chứng chỉ quỹ" icon="pie_chart" columns={accountColumns} rows={d.fundCertAccounts}
          searchKey="no" searchPlaceholder="Số tài khoản" />
      </div>
    );
  }

  // ===== TAB 3 · Danh sách uỷ quyền =====
  function TabAuthorization() {
    const d = CP_DATA.hsCaNhan;
    const PERMS = [
      ["View", "View"], ["Report", "Report"], ["Cash", "Cash"], ["Buy", "Buy"], ["Sell", "Sell"],
      ["Sign", "Sign"], ["Transfer", "Transfer"], ["Margin", "Margin"], ["RightOff", "Right Off"]
    ];
    const permCell = (on) => on
      ? <Icon name="check_circle" size={17} className="text-emerald-600 ico-fill" filled />
      : <Icon name="remove" size={16} className="text-[#6B6560]/40" />;
    const columns = [
      idxCol,
      { label: "STK uỷ quyền", render: (r) => <span className="font-mono font-semibold text-[#1A1A1A]">{r.stk}</span> },
      { label: "Bên nhận uỷ quyền", render: (r) => (
          <div className="flex items-center gap-2 min-w-[150px]">
            <Avatar name={r.grantee} size={28} tone="purple" />
            <div className="leading-tight">
              <p className="font-semibold text-[#1A1A1A]">{r.grantee}</p>
              <p className="text-[11px] text-[#6B6560]">{r.relation}</p>
            </div>
          </div>
        ) },
      { label: "CustomerID", render: (r) => <span className="font-mono text-[#6B6560]">{r.customerId}</span> },
      { label: "Ngày bắt đầu", render: (r) => <span className="font-mono text-[#6B6560]">{r.from}</span> },
      { label: "Ngày kết thúc", render: (r) => <span className="font-mono text-[#6B6560]">{r.to}</span> },
      ...PERMS.map(([k, lbl]) => ({ label: lbl, align: "center", thClassName: "px-2", tdClassName: "px-2", render: (r) => permCell(r.perms[k]) }))
    ];
    return (
      <ReportTable title="Danh sách uỷ quyền" icon="manage_accounts" columns={columns} rows={d.authorizations}
        searchKey="stk" searchPlaceholder="Số tài khoản"
        action={<Button tone="soft" size="sm" icon="add">Thêm uỷ quyền</Button>}
        empty={{ icon: "manage_accounts", title: "No Data", sub: "Tài khoản chưa có người được uỷ quyền giao dịch." }} />
    );
  }

  // ===== TAB 4 · Tài khoản thụ hưởng =====
  function TabBeneficiary() {
    const d = CP_DATA.hsCaNhan;
    const bankColumns = [
      idxCol,
      { label: "Số tài khoản", render: (r) => <span className="font-mono font-semibold text-[#1A1A1A]">{r.no}</span> },
      { label: "Người thụ hưởng", render: (r) => <span className="font-medium">{r.beneficiary}</span> },
      { label: "Ngân hàng", render: (r) => (
          <div className="flex items-center gap-2">
            <span className="w-7 h-7 rounded-lg bg-[#F0EDE8] text-[#2A2420] flex items-center justify-center font-display font-bold text-[12px]">{r.bank[0]}</span>
            <div className="leading-tight">
              <p className="font-medium text-[#1A1A1A]">{r.bank}</p>
              <p className="text-[11px] text-[#6B6560]">{r.branch}</p>
            </div>
          </div>
        ) },
      { label: "Mặc định", align: "center", render: (r) => r.isDefault ? <Badge tone="green" size="sm" icon="star">Mặc định</Badge> : <span className="text-[#6B6560]">—</span> },
      actionCol
    ];
    const counterpartColumns = [
      idxCol,
      { label: "Số tài khoản", render: (r) => <span className="font-mono font-semibold text-[#1A1A1A]">{r.no}</span> },
      { label: "Chủ tài khoản", key: "owner" },
      actionCol
    ];
    return (
      <div className="space-y-4">
        <ReportTable title="Tài khoản ngân hàng" icon="account_balance" columns={bankColumns} rows={d.bankAccounts}
          searchKey="no" searchPlaceholder="Số tài khoản"
          action={<Button tone="soft" size="sm" icon="add">Thêm tài khoản</Button>} />
        <ReportTable title="Tài khoản đối ứng" icon="swap_horiz" columns={counterpartColumns} rows={d.counterpartAccounts}
          searchKey="no" searchPlaceholder="Số tài khoản"
          empty={{ icon: "swap_horiz", title: "No Data", sub: "Chưa có tài khoản đối ứng được khai báo." }} />
      </div>
    );
  }

  // ===== container (controlled by `sub` from the DGO left nav) =====
  function HsCaNhan({ client, sub = "basic" }) {
    return (
      <div>
        {sub === "basic" && <TabBasic client={client} />}
        {sub === "accounts" && <TabAccounts />}
        {sub === "auth" && <TabAuthorization />}
        {sub === "beneficiary" && <TabBeneficiary />}
      </div>
    );
  }

  window.HsCaNhan = HsCaNhan;
})();

</script>
<script type="text/babel">
/* global React, window */
// ============== TAB 2 · Daccount — Tài sản & hiệu suất ==============
// Groups: Tổng quan · Chứng khoán · Tiền · Nợ · Hiệu suất
(function () {
  const { CP_DATA, ALLOCATION } = window.DSB_DATA;

  // dual-line comparison (portfolio vs benchmark), values in %
  function LineCompare({ a, b, height = 160 }) {
    const all = [...a, ...b];
    const max = Math.max(...all), min = Math.min(...all, 0);
    const r = max - min || 1;
    const W = 100, H = height;
    const toPts = (arr) => arr.map((v, i) => {
      const x = (i / (arr.length - 1)) * W;
      const y = H - 6 - ((v - min) / r) * (H - 16);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(" ");
    return (
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" className="w-full" style={{ height }}>

  const sums = (client) => {
    const heldAwaySum = CP_DATA.heldAway.reduce((s, x) => s + x.value, 0);

  // ===== Tổng quan · Báo cáo tài sản (tree report — matches production) =====
  // recursively sum leaf values (tr = million VND)
  function nodeSum(n) {
    if (n.children && n.children.length) return n.children.reduce((s, c) => s + nodeSum(c), 0);
    return n.value || 0;
  }
  function flattenLeaves(nodes, acc) {
    nodes.forEach(n => {
      if (n.children && n.children.length) flattenLeaves(n.children, acc);
      else acc.push(n);
    });
    return acc;
  }
  // full đồng with vi-VN grouping
  const fmtVnd = (tr) => Math.round(tr * 1e6).toLocaleString("vi-VN");

  function AssetTree({ nodes }) {
    // expand top categories by default; deeper expandables collapsed
    const initial = {};
    const seed = (list, path, depth) => list.forEach((n, i) => {
      const key = path + "/" + i;
      if (n.children && n.children.length) { initial[key] = depth === 0; seed(n.children, key, depth + 1); }
    });
    seed(nodes, "", 0);
    const [open, setOpen] = useState(initial);

    const rows = [];
    const walk = (list, path, depth) => {
      list.forEach((n, i) => {
        const key = path + "/" + i;
        const hasKids = !!(n.children && n.children.length);
        const isOpen = open[key];
        const isCat = depth === 0;
        const val = nodeSum(n);
        rows.push(
          <tr key={key} className={`border-b border-[#E3DFD5] ${isCat ? "" : "hover:bg-[#F0EDE8]/40"} transition-colors`}>
            <td className="py-[9px] pr-3" style={{ paddingLeft: 12 + depth * 20 }}>
              <button
                onClick={() => hasKids && setOpen(o => ({ ...o, [key]: !o[key] }))}
                className={`flex items-center gap-1 text-left ${hasKids ? "cursor-pointer" : "cursor-default"}`}>
                {hasKids
                  ? <Icon name={isOpen ? "arrow_drop_up" : "arrow_drop_down"} size={20} className={isCat ? "text-[#3D3530] -ml-1.5" : "text-[#6B6560] -ml-1.5"} />
                  : <span className="inline-block w-[6px]" />}
                <span className={isCat
                  ? "text-[12.5px] font-semibold uppercase tracking-wide text-[#2A2420]"
                  : `text-[12.5px] ${hasKids ? "font-medium text-[#1A1A1A]" : "text-[#6B6560]"}`}>
                  {n.label}
                </span>
              </button>
            </td>
            <td className={`py-[9px] pr-3 text-right font-mono tabular-nums ${isCat ? "text-[12.5px] font-bold text-[#2A2420]" : "text-[12.5px] text-[#1A1A1A]"}`}>
              {fmtVnd(val)}
            </td>
          </tr>
        );
        if (hasKids && isOpen) walk(n.children, key, depth + 1);
      });
    };
    walk(nodes, "", 0);
    return <tbody>{rows}</tbody>;
  }
